name: Jira Ticket Enforcement

on:
  pull_request:
    types: [opened, edited, synchronize]
  push:
    branches-ignore:
      - main
      - staging
      - develop

permissions:
  contents: read        # least-privilege: only read repo content
  pull-requests: read   # only read PR metadata

jobs:
  enforce-jira-compliance:
    runs-on: ubuntu-latest
    steps:
      - name: Check Branch Name for Jira Ticket
        if: github.event_name == 'push'
        run: |
          BRANCH_NAME="${{ github.ref_name }}"
          JIRA_PATTERN="CYVD-[0-9]+"

          echo "Checking branch name: $BRANCH_NAME"

          if echo "$BRANCH_NAME" | grep -qE "$JIRA_PATTERN"; then
            echo "✅ Branch name contains Jira ticket reference"
          else
            echo "❌ Branch name must contain a Jira ticket reference (e.g., feature/CYVD-123-new-feature)"
            echo "Current branch: $BRANCH_NAME"
            exit 1
          fi

      - name: Check PR Title and Description for Jira Ticket
        if: github.event_name == 'pull_request'
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          JIRA_PATTERN="CYVD-[0-9]+"

          echo "Checking PR: $PR_TITLE"
          echo "Branch: $PR_BRANCH"

          SEARCH_TEXT=$(printf '%s %s %s' "$PR_TITLE" "$PR_BODY" "$PR_BRANCH")

          if echo "$SEARCH_TEXT" | grep -qE "$JIRA_PATTERN"; then
            TICKET=$(echo "$SEARCH_TEXT" | grep -oE "$JIRA_PATTERN" | head -1)
            echo "✅ Jira ticket found: $TICKET"
          else
            echo "❌ No Jira ticket reference found"
            echo "Please include a Jira ticket reference in:"
            echo "  - PR title: '[CYVD-123] Add new feature'"
            echo "  - PR description: 'Fixes CYVD-123'"
            echo "  - Branch name: 'feature/CYVD-123-new-feature'"
            exit 1
          fi
