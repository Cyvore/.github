name: Sync Release Notes Caller

on:
  schedule:
    - cron: "0 6 * * *"  # daily at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync release-notes caller to org repos
        uses: BetaHuhn/repo-file-sync-action@v1
        env:
          GH_PAT: ${{ secrets.GH_ORG_PAT }}
          CONFIG_PATH: .github/sync.yml
          SKIP_PR: true
          COMMIT_PREFIX: "ci:"
          COMMIT_BODY: "Adds release notes caller workflow — auto-synced from cyvore/.github"
