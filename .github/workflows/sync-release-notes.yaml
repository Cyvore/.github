name: Sync Release Notes Caller

on:
  schedule:
    - cron: '0 6 * * *'  # daily at 06:00 UTC
  workflow_dispatch:
    inputs:
      repo:
        description: 'Specific repo to add caller to (leave empty for all repos)'
        required: false
        type: string

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Add release-notes caller to repos missing it
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_ORG_PAT }}
          script: |
            const CALLER = `name: Release Notes
            on:
              push:
                tags: ['*']
            jobs:
              release-notes:
                uses: cyvore/.github/.github/workflows/publish-release-notes.yaml@main
                secrets: inherit
            `;
            // Normalize indentation — the template literal above indents with the script
            const content = CALLER.split('\n').map(l => l.replace(/^            /, '')).join('\n');
            const encoded = Buffer.from(content).toString('base64');

            const org = 'cyvore';
            const filePath = '.github/workflows/release-notes.yml';
            const targetRepo = '${{ inputs.repo }}';

            let repos;
            if (targetRepo) {
              repos = [{ name: targetRepo }];
            } else {
              const { data } = await github.rest.repos.listForOrg({ org, per_page: 100, type: 'private' });
              repos = data;
            }

            let added = 0, skipped = 0, failed = 0;

            for (const repo of repos) {
              if (repo.name === '.github') { skipped++; continue; }

              try {
                await github.rest.repos.getContent({ owner: org, repo: repo.name, path: filePath });
                console.log(`SKIP  ${repo.name} — already has caller`);
                skipped++;
              } catch (e) {
                if (e.status !== 404) {
                  console.log(`FAIL  ${repo.name} — ${e.message}`);
                  failed++;
                  continue;
                }
                try {
                  await github.rest.repos.createOrUpdateFileContents({
                    owner: org,
                    repo: repo.name,
                    path: filePath,
                    message: 'ci: add release notes caller workflow',
                    content: encoded,
                  });
                  console.log(`ADDED ${repo.name}`);
                  added++;
                } catch (err) {
                  console.log(`FAIL  ${repo.name} — ${err.message}`);
                  failed++;
                }
              }
            }

            console.log(`\nDone: ${added} added, ${skipped} skipped, ${failed} failed`);
