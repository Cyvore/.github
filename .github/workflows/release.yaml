name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

jobs:
  validate:
    uses: cyvore/.github/.github/workflows/validate-tag.yml@main
    with:
      tag: ${{ github.ref_name }}
      repo_name: ${{ github.event.repository.name }}
    secrets:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  publish:
    needs: validate
    if: needs.validate.outputs.has_description == 'true'
    uses: cyvore/.github/.github/workflows/publish-release-notes.yml@main
    with:
      tag: ${{ github.ref_name }}
      repo_name: ${{ github.event.repository.name }}
    secrets:
      CONFLUENCE_BASE_URL:  ${{ secrets.CONFLUENCE_BASE_URL }}
      CONFLUENCE_EMAIL:     ${{ secrets.CONFLUENCE_EMAIL }}
      CONFLUENCE_API_TOKEN: ${{ secrets.CONFLUENCE_API_TOKEN }}
      CONFLUENCE_PAGE_ID:   ${{ secrets.CONFLUENCE_PAGE_ID }}
      SLACK_WEBHOOK_URL:    ${{ secrets.SLACK_WEBHOOK_URL }}
